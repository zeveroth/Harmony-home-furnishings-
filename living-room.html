<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Living Room - Harmony Home Furnishings</title>

<link rel="stylesheet" href="css/style.css">

<!-- AR viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- JS files -->
<script src="js/products.js" defer></script>
<script src="js/utils.js" defer></script>
<script src="js/cart.js" defer></script>
</head>

<body>

<header class="header">
  <div class="logo">Harmony Home Furnishings</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="living-room.html">Living Room</a>
    <a href="bedroom.html">Bedroom</a>
    <a href="dining.html">Dining</a>
    <a href="outdoor.html">Outdoor</a>
    <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
  </nav>
</header>

<section class="category-page">
  <h1>Living Room Furniture</h1>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <input type="number" id="minPrice" placeholder="Min Price">
    <input type="number" id="maxPrice" placeholder="Max Price">
    <select id="ratingFilter">
      <option value="">Rating</option>
      <option value="4">4★ & up</option>
      <option value="4.5">4.5★ & up</option>
    </select>
    <button onclick="applyFilters('living')">Apply</button>
  </div>

  <!-- PRODUCT GRID -->
  <div class="products-grid" id="products-grid"></div>
</section>

<script>
const grid = document.getElementById("products-grid");

function renderLiving(list) {
  grid.innerHTML = "";

  list
    .filter(p => p.category === "living")
    .forEach(p => {
      const div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>

        <model-viewer 
          src="${p.glb}" 
          ios-src="${p.usdz}" 
          ar 
          camera-controls 
          auto-rotate 
          style="width:100%;height:300px;">
        </model-viewer>

        <button onclick="addToCart(${p.id})">Add to Cart</button>
      `;

      grid.appendChild(div);
    });
}

document.addEventListener("DOMContentLoaded", () => {
  renderLiving(products);
});
</script>

</body>
</html>
