<!DOCTYPE html>
<html>
<head>
<title>Bedroom Furniture</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#222;color:white;text-align:center;padding:30px;}
.products{display:flex;flex-wrap:wrap;justify-content:center;padding:20px;}
.product{
  background:white;
  width:260px;
  margin:15px;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
  border-radius:6px;
  text-align:center;
  padding-bottom:15px;
}
.product img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.product button{
  background:#2e7d32;
  color:white;
  padding:10px;
  border:none;
  width:100%;
  cursor:pointer;
}
</style>

</head>

<body>

<header>
  <h1>Bedroom Furniture</h1>
  <a href="index.html" style="color:white;">Back Home</a>
</header>

<div class="products" id="product-list"></div>

<div class="floating-cart-btn" onclick="window.location.href='cart.html'">
  Cart <span id="cart-count-floating">0</span>
</div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>

<script>
// Set the category for this page
const category = "bedroom";

// Filter products
const filtered = products.filter(p => p.category === category);

// Render products
const container = document.getElementById("product-list");

filtered.forEach(p => {
  const div = document.createElement("div");
  div.className = "product";
  div.innerHTML = `
    <img src="${p.image}">
    <h3>${p.name}</h3>
    <p>$${p.price}</p>
    <p>⭐ ${p.rating}</p>
    <model-viewer src="${p.glb}" ios-src="${p.usdz}" ar ar-modes="scene-viewer quick-look" camera-controls style="width:100%;height:200px;"></model-viewer>
    <button onclick="addToCart(${p.id})">Add to Cart</button>
  `;
  container.appendChild(div);
});
</script>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</body>
</html>
