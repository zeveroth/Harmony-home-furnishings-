<!DOCTYPE html>
<html>
<head>
<title>Category</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;color:#111;transition:background .3s,color .3s;}
body.dark{background:#121212;color:#eee;}
header{background:#222;color:white;text-align:center;padding:30px;position:sticky;top:0;z-index:10;}
header .top-row{display:flex;justify-content:space-between;align-items:center;max-width:900px;margin:0 auto;}
header a{color:white;text-decoration:none;}
.products{display:flex;flex-wrap:wrap;justify-content:center;padding:20px;}
.product{
  background:white;
  width:260px;
  margin:15px;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
  border-radius:6px;
  text-align:center;
  padding-bottom:15px;
  transition:background .3s,color .3s;
}
body.dark .product{background:#1f1f1f;color:#eee;}
.product img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:6px 6px 0 0;
}
.product button{
  background:#2e7d32;
  color:white;
  padding:10px;
  border:none;
  width:100%;
  cursor:pointer;
}
.product .secondary-btn{
  background:#1565c0;
}
.product .wishlist-btn{
  background:#8e24aa;
}
.sort-bar{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  flex-wrap:wrap;
}
.sort-bar select,.sort-bar button{
  padding:8px 10px;
}
.breadcrumb{
  text-align:center;
  margin-top:5px;
  color:#555;
}
body.dark .breadcrumb{color:#bbb;}
.floating-cart-btn{
  position:fixed;
  right:15px;
  bottom:15px;
  background:#2e7d32;
  color:white;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,.3);
}
.dark-toggle{
  background:#444;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:4px;
  cursor:pointer;
}
body.dark .dark-toggle{background:#ddd;color:#111;}
.load-more{
  text-align:center;
  padding:15px;
  color:#555;
}
body.dark .load-more{color:#bbb;}
.category-icon{
  font-size:24px;
  margin-right:8px;
}
</style>

</head>

<body>

<header>
  <div class="top-row">
    <div>
      <span class="category-icon" id="category-icon">🛋️</span>
      <span id="category-title"></span>
    </div>
    <div>
      <a href="index.html">Home</a> |
      <a href="cart.html">Cart (<span id="cart-count-floating">0</span>)</a>
      <button class="dark-toggle" id="darkToggle">Dark</button>
    </div>
  </div>
</header>

<div class="sort-bar">
  <select id="sort-select">
    <option value="default">Sort By</option>
    <option value="price-low">Price: Low to High</option>
    <option value="price-high">Price: High to Low</option>
    <option value="rating-high">Rating: High to Low</option>
  </select>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="products" id="product-list"></div>

<div class="load-more" id="loadMoreText">Scroll to load more…</div>

<div class="floating-cart-btn" onclick="window.location.href='cart.html'">
  Cart <span id="cart-count-floating">0</span>
</div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>

<script>
// URL + category
const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

// Title + icon
const titleEl = document.getElementById("category-title");
titleEl.innerText = category.replace("-", " ").replace("-", " ").toUpperCase();

const iconEl = document.getElementById("category-icon");
if(category === "living-room") iconEl.textContent = "🛋️";
if(category === "bedroom") iconEl.textContent = "🛏️";
if(category === "dining") iconEl.textContent = "🍽️";
if(category === "outdoor") iconEl.textContent = "🌿";

// Breadcrumb
document.getElementById("breadcrumb").innerHTML =
  `<a href="index.html">Home</a> › ${category.replace("-", " ")}`;

// Filter products
let filtered = products.filter(p => p.category === category);

// Wishlist
let wishlist = JSON.parse(localStorage.getItem("wishlist") || "[]");
function toggleWishlist(id){
  if(wishlist.includes(id)){
    wishlist = wishlist.filter(x => x !== id);
  } else {
    wishlist.push(id);
  }
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  renderProducts(currentSlice());
}

// Pagination / infinite scroll
let currentPage = 1;
const perPage = 8;

function currentSlice(){
  return filtered.slice(0, currentPage * perPage);
}

// Render
function renderProducts(list){
  const container = document.getElementById("product-list");
  container.innerHTML = "";

  list.forEach(p => {
    const inWish = wishlist.includes(p.id);
    const div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <p>⭐ ${p.rating}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
      <button class="secondary-btn" onclick="viewDetails(${p.id})">Details</button>
      <button class="wishlist-btn" onclick="toggleWishlist(${p.id})">
        ${inWish ? "♥ In Wishlist" : "♡ Add to Wishlist"}
      </button>
      <button class="secondary-btn" onclick="openAR('${p.glb}', '${p.usdz}')">View in AR</button>
    `;
    container.appendChild(div);
  });

  const loadMoreText = document.getElementById("loadMoreText");
  if(currentPage * perPage >= filtered.length){
    loadMoreText.textContent = "No more items.";
  } else {
    loadMoreText.textContent = "Scroll to load more…";
  }
}

// Sorting
document.getElementById("sort-select").addEventListener("change", e => {
  const val = e.target.value;

  if(val === "price-low") filtered.sort((a,b)=>a.price - b.price);
  if(val === "price-high") filtered.sort((a,b)=>b.price - a.price);
  if(val === "rating-high") filtered.sort((a,b)=>b.rating - a.rating);

  currentPage = 1;
  renderProducts(currentSlice());
});

// AR
function openAR(glb, usdz){
  if (/iPhone|iPad|iPod/.test(navigator.userAgent)){
    window.location.href = usdz;
  } else {
    window.location.href = glb;
  }
}

// Product details
function viewDetails(id){
  window.location.href = `product.html?id=${id}`;
}

// Infinite scroll
window.addEventListener("scroll", () => {
  const {scrollTop, scrollHeight, clientHeight} = document.documentElement;
  if(scrollTop + clientHeight >= scrollHeight - 50){
    if(currentPage * perPage < filtered.length){
      currentPage++;
      renderProducts(currentSlice());
    }
  }
});

// Dark mode
const darkToggle = document.getElementById("darkToggle");
const savedTheme = localStorage.getItem("theme");
if(savedTheme === "dark"){
  document.body.classList.add("dark");
  darkToggle.textContent = "Light";
}
darkToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  darkToggle.textContent = isDark ? "Light" : "Dark";
});

// Initial render
renderProducts(currentSlice());
</script>

</body>
</html>
