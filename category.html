<!DOCTYPE html>
<html>
<head>
<title>Category</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#222;color:white;text-align:center;padding:30px;}
.products{display:flex;flex-wrap:wrap;justify-content:center;padding:20px;}
.product{
  background:white;
  width:260px;
  margin:15px;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
  border-radius:6px;
  text-align:center;
  padding-bottom:15px;
}
.product img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.product button{
  background:#2e7d32;
  color:white;
  padding:10px;
  border:none;
  width:100%;
  cursor:pointer;
}
.sort-bar{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}
.sort-bar select{
  padding:8px;
}
.breadcrumb{
  text-align:center;
  margin-top:10px;
  color:#555;
}
</style>

</head>

<body>

<header>
  <h1 id="category-title"></h1>
  <a href="index.html" style="color:white;">Back Home</a>
</header>

<div class="sort-bar">
  <select id="sort-select">
    <option value="default">Sort By</option>
    <option value="price-low">Price: Low to High</option>
    <option value="price-high">Price: High to Low</option>
    <option value="rating-high">Rating: High to Low</option>
  </select>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="sort-bar">
  <select id="sort-select">
    <option value="default">Sort By</option>
    <option value="price-low">Price: Low to High</option>
    <option value="price-high">Price: High to Low</option>
    <option value="rating-high">Rating: High to Low</option>
  </select>
</div>

<div class="products" id="product-list"></div>

<div class="floating-cart-btn" onclick="window.location.href='cart.html'">
  Cart <span id="cart-count-floating">0</span>
</div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>

<script>
// Read category from URL
const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

// Set title
document.getElementById("category-title").innerText =
  category.replace("-", " ").replace("-", " ").toUpperCase();

// Breadcrumb
document.getElementById("breadcrumb").innerHTML =
  `<a href="index.html">Home</a> › ${category.replace("-", " ")}`;

// Filter products
let filtered = products.filter(p => p.category === category);

// Render function
function renderProducts(list){
  const container = document.getElementById("product-list");
  container.innerHTML = "";

  list.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <p>⭐ ${p.rating}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
      <button onclick="openAR('${p.glb}', '${p.usdz}')">View in AR</button>
    `;
    container.appendChild(div);
  });
}

// Sorting
document.getElementById("sort-select").addEventListener("change", e => {
  const val = e.target.value;

  if(val === "price-low") filtered.sort((a,b)=>a.price-b.price);
  if(val === "price-high") filtered.sort((a,b)=>b.price-a.price);
  if(val === "rating-high") filtered.sort((a,b)=>b.rating-a.rating);

  renderProducts(filtered);
});

// AR function
function openAR(glb, usdz){
  if (/iPhone|iPad|iPod/.test(navigator.userAgent)){
    window.location.href = usdz;
  } else {
    window.location.href = glb;
  }
}

// Initial render
renderProducts(filtered);
</script>

</body>
</html>
