<!DOCTYPE html>
<html>
<head>
<title>Wishlist</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#222;color:white;text-align:center;padding:20px;}
.products{display:flex;flex-wrap:wrap;justify-content:center;padding:20px;}
.product{
  background:white;
  width:260px;
  margin:15px;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
  border-radius:6px;
  text-align:center;
  padding-bottom:15px;
}
.product img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.product button{
  background:#2e7d32;
  color:white;
  padding:10px;
  border:none;
  width:100%;
  cursor:pointer;
}
.remove-btn{
  background:#b71c1c;
}
</style>

</head>

<body>

<header>
  <h1>Your Wishlist</h1>
  <a href="index.html" style="color:white;">Back Home</a>
</header>

<div class="products" id="wishlist-container"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>

<script>
// Load wishlist IDs
let wishlist = JSON.parse(localStorage.getItem("wishlist") || "[]");

// Filter products
let items = products.filter(p => wishlist.includes(p.id));

// Render
function renderWishlist(){
  const container = document.getElementById("wishlist-container");
  container.innerHTML = "";

  if(items.length === 0){
    container.innerHTML = "<p>No items in wishlist.</p>";
    return;
  }

  items.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <p>⭐ ${p.rating}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
      <button class="remove-btn" onclick="removeFromWishlist(${p.id})">Remove</button>
    `;
    container.appendChild(div);
  });
}

// Remove item
function removeFromWishlist(id){
  wishlist = wishlist.filter(x => x !== id);
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  items = products.filter(p => wishlist.includes(p.id));
  renderWishlist();
}

renderWishlist();
</script>

</body>
</html>
