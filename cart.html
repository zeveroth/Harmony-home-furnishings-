<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;color:#111;}
header{
  background:#222;
  color:white;
  padding:20px;
  text-align:center;
  font-size:22px;
}
.cart-container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:8px;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
}
.cart-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 0;
  border-bottom:1px solid #ddd;
}
.cart-item img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}
.item-info{
  flex:1;
  margin-left:15px;
}
.item-info h3{
  margin:0;
  font-size:18px;
}
.item-info p{
  margin:5px 0;
}
.qty-controls{
  display:flex;
  align-items:center;
  gap:8px;
}
.qty-controls button{
  padding:6px 10px;
  border:none;
  background:#1565c0;
  color:white;
  cursor:pointer;
  border-radius:4px;
}
.remove-btn{
  background:#b71c1c;
  padding:8px 12px;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:4px;
}
.total-box{
  text-align:right;
  font-size:20px;
  margin-top:20px;
}
.actions{
  display:flex;
  justify-content:space-between;
  margin-top:25px;
}
.actions button{
  padding:12px 20px;
  border:none;
  cursor:pointer;
  border-radius:6px;
  font-size:16px;
}
.continue-btn{
  background:#444;
  color:white;
}
.checkout-btn{
  background:#2e7d32;
  color:white;
}
.empty{
  text-align:center;
  padding:40px;
  font-size:20px;
  color:#555;
}
</style>

</head>

<body>

<header>Your Cart</header>

<div class="cart-container" id="cart-container"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>

<script>
// Render cart
function renderCart(){
  const container = document.getElementById("cart-container");
  container.innerHTML = "";

  if(cart.length === 0){
    container.innerHTML = `<div class="empty">Your cart is empty.</div>`;
    return;
  }

  let total = 0;

  cart.forEach((item, index) => {
    const product = products.find(p => p.id === item.id);
    if(!product) return;

    total += product.price * item.qty;

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <img src="${product.image}">
      <div class="item-info">
        <h3>${product.name}</h3>
        <p>$${product.price}</p>
      </div>

      <div class="qty-controls">
        <button onclick="changeQty(${index}, -1)">−</button>
        <span>${item.qty}</span>
        <button onclick="changeQty(${index}, 1)">+</button>
      </div>

      <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
    `;

    container.appendChild(div);
  });

  container.innerHTML += `
    <div class="total-box">
      <strong>Total: $${total.toFixed(2)}</strong>
    </div>

    <div class="actions">
      <button class="continue-btn" onclick="window.location.href='index.html'">Continue Shopping</button>
      <button class="checkout-btn" onclick="checkout()">Checkout</button>
    </div>
  `;
}

// Change quantity
function changeQty(index, amount){
  cart[index].qty += amount;
  if(cart[index].qty <= 0){
    cart.splice(index, 1);
  }
  saveCart();
  renderCart();
}

// Override removeItem to re-render
function removeItem(index){
  cart.splice(index, 1);
  saveCart();
  renderCart();
}

// Checkout placeholder
function checkout(){
  alert("Checkout coming soon!");
}

// Initial render
renderCart();
</script>

</body>
</html>
