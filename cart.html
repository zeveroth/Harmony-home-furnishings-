<!DOCTYPE html>
<html>
<head>
  <title>Your Cart</title>
  <script src="include-loader.js" defer></script>
  <script src="js/products.js" defer></script>
  <script src="js/cart.js" defer></script>

  <style>
    .cart-container {
      padding: 40px;
    }

    .cart-item {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid #ddd;
    }

    .cart-item img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 10px;
    }

    .cart-info h3 {
      margin: 0;
    }

    .remove-btn {
      background: #c0392b;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      display: inline-block;
      margin-top: 10px;
    }

    .total {
      font-size: 24px;
      margin-top: 30px;
      font-weight: bold;
    }

    .checkout-btn {
      background: #111;
      color: white;
      padding: 14px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 18px;
      display: inline-block;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div data-include="global-header.html"></div>

<div class="cart-container">
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <div id="cart-total" class="total"></div>
  <a href="#" class="checkout-btn">Proceed to Checkout</a>
</div>

<div data-include="global-footer.html"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const cart = getCart();
  const container = document.getElementById("cart-items");
  const totalEl = document.getElementById("cart-total");

  if (cart.length === 0) {
    container.innerHTML = "<p>Your cart is empty.</p>";
    totalEl.innerHTML = "";
    return;
  }

  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;

    const div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      <img src="${item.image}">
      <div class="cart-info">
        <h3>${item.name}</h3>
        <p>$${item.price}</p>
        <a href="#" class="remove-btn" onclick="removeFromCart(${index}); location.reload();">Remove</a>
      </div>
    `;

    container.appendChild(div);
  });

  totalEl.innerHTML = "Total: $" + total;
});
</script>

</body>
</html>
