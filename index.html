<!DOCTYPE html>
<html>
<head>
<title>Harmony Home Furnishings</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{
  background:#222;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
header .logo{
  font-size:22px;
  font-weight:bold;
}
nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
  font-size:16px;
}
.search-bar{
  width:100%;
  text-align:center;
  margin-top:15px;
}
.search-bar input{
  width:90%;
  max-width:500px;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
}
.products{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
}
.product{
  background:white;
  width:260px;
  margin:15px;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
  border-radius:6px;
  text-align:center;
  padding-bottom:15px;
}
.product img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:6px 6px 0 0;
}
.product button{
  background:#1565c0;
  color:white;
  padding:10px;
  border:none;
  width:100%;
  cursor:pointer;
}
.category-buttons{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:20px;
}
.category-buttons button{
  padding:10px 15px;
  border:none;
  background:#444;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>

</head>

<body>

<header>
  <div class="logo">Harmony Home Furnishings</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="wishlist.html">Wishlist</a>
    <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
  </nav>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search products...">
  </div>
</header>

<!-- CATEGORY BUTTONS -->
<div class="category-buttons">
  <button onclick="window.location.href='category.html?cat=living-room'">Living Room</button>
  <button onclick="window.location.href='category.html?cat=bedroom'">Bedroom</button>
  <button onclick="window.location.href='category.html?cat=dining'">Dining</button>
  <button onclick="window.location.href='category.html?cat=outdoor'">Outdoor</button>
</div>

<!-- PRODUCT GRID -->
<div class="products" id="product-list"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>

<script>
// Render all products on homepage
function renderAllProducts(list){
  const container = document.getElementById("product-list");
  container.innerHTML = "";

  list.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <p>⭐ ${p.rating}</p>
      <button onclick="window.location.href='product.html?id=${p.id}'">View Product</button>
    `;
    container.appendChild(div);
  });
}

// Initial load
renderAllProducts(products);

// Search filter
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", () => {
  const term = searchInput.value.toLowerCase();
  const results = products.filter(p =>
    p.name.toLowerCase().includes(term)
  );
  renderAllProducts(results);
});
</script>

</body>
</html>
