<header class="site-header">
  <div class="container header-flex">

    <a href="/Harmony-home-furnishings-/" class="logo">
      Harmony Home Furnishings
    </a>

    <nav class="nav-links">
      <a href="/Harmony-home-furnishings-/category.html?cat=living">Living</a>
      <a href="/Harmony-home-furnishings-/category.html?cat=bedroom">Bedroom</a>
      <a href="/Harmony-home-furnishings-/category.html?cat=dining">Dining</a>
    </nav>

    <div class="header-search">
      <input id="searchInput" type="text" placeholder="Search products...">
    </div>

    <div class="header-actions">
      <a href="/Harmony-home-furnishings-/cart.html" class="cart-icon">🛒</a>
      <a href="/Harmony-home-furnishings-/wishlist.html" class="wishlist-icon">❤️</a>
    </div>

  </div>
</header>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("searchInput");

  input.addEventListener("keypress", e => {
    if (e.key === "Enter") {
      const q = input.value.trim();
      if (q.length > 0) {
        window.location.href = `/Harmony-home-furnishings-/search.html?q=${encodeURIComponent(q)}`;
      }
    }
  });
});
</script>
